<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="js/jquery.js"></script>
    <script type="text/javascript" src="js/modules/validation.js"></script>
    <script type="text/javascript" src="js/pages/script_connexion.js"></script>
    <link type="text/css" rel="stylesheet" href="css/style_connexion.css" />
    <title>Connexion</title>

<body>

   <div class="login-box">
    <h1>Ha, vous revoilà !</h1>
    <p>Nous sommes ravis de vous revoir !</p>
    
    <form action="js/pages/script_connexion.js" method="POST" name="monFormulaire">
        
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="user_email" required autofocus>
            <label for="mdp">mot de passe</label>
            <input type="password" id="mdp" name="user_mdp" required autofocus>
            <a href="inscription.html" id="mdp-oublie">Mot de passe oublié ?</a>
        </div>
        
        <button type="submit">Se connecter</button>
        
        <div class="footer-text">
            Besoin d'un compte ? <a href="inscription.html">S'inscrire</a>
        </div>

    </form>
    </div>

</body>
</html>
