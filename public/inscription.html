<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript" src="js/jquery.js"></script>
    <script type="text/javascript" src="js/modules/validation.js"></script>
    <script type="text/javascript" src="js/pages/script_inscriptio.js"></script>
    <link type="text/css" rel="stylesheet" href="css/style_connexion.css" />
    <title>Connexion</title>
    
</head>
<body>

   <div class="login-box">
    <h1>Ha, vous revoilà !</h1>
    <p>Nous sommes ravis de vous revoir !</p>
    
    <form action="js/pages/script_inscriptio.js" method="POST" name="monFormulaire">
        
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="user_email" required autofocus>
            <label for="Pseudo">Pseudo</label>
            <input type="text" id="Pseudo" name="user_name" required autofocus>
            <label for="mdp">Mot de passe</label>
            <input type="password" id="mdp" name="user_mdp" required autofocus>
            <label for="Cmdp">Confirmer le mot de passe</label>
            <input type="password" id="Cmdp" name="user_Cmdp" required autofocus>
        </div>
        
        <button type="submit">Créer</button>
        <div class="footer-text">
            Vous avez déja un compte ? <a href="index.html">Se connecter</a>
        </div>

    </form>
    </div>

</body>
</html>
